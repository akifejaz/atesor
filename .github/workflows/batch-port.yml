name: ATESOR AI Batch Porting Tests

# Runs the Atesor AI agent across a curated list of packages, building each
# one inside the riscv64 sandbox container.
#
# Jobs:
#
#   atesor-debian-smoke   debian sandbox (ubuntu:jammy base) + smoke list
#   atesor-debian-full    debian sandbox (ubuntu:jammy base) + full  list
#   atesor-alpine-smoke   alpine sandbox                     + smoke list
#   atesor-alpine-full    alpine sandbox                     + full  list

on:
  push:
    branches: [main, ci-dev]
  pull_request:
    branches: [main]
  # schedule:
  #   # 02:00 UTC nightly -> full sweep on both platforms
  #   - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Which list(s) to run"
        type: choice
        default: smoke
        options: [smoke, full, both]
      platform:
        description: "Sandbox distro"
        type: choice
        default: both
        options: [debian, alpine, both]
      workers:
        description: "Parallel worker containers"
        type: string
        default: "2"
      group_size:
        description: "Max packages per full-list shard (job)"
        type: string
        default: "50"

permissions:
  contents: write   # publish assets to the monthly GitHub Release

env:
  PYTHON_VERSION: "3.11"
  # Force unbuffered stdout/stderr so batch_test.py logs stream live to
  PYTHONUNBUFFERED: "1"

jobs:
  # ------------------------------------------------------------------------- #
  # 1. atesor-debian-smoke
  # ------------------------------------------------------------------------- #
  atesor-debian-smoke:
    name: atesor-debian-smoke
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'workflow_dispatch' &&
        (inputs.target == 'smoke' || inputs.target == 'both') &&
        (inputs.platform == 'debian' || inputs.platform == 'both')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: batch-port-debian-smoke-${{ github.ref }}
      cancel-in-progress: true
    env:
      ATESOR_PLATFORM: debian
      LIST: smoke
      WORKERS: ${{ inputs.workers || '2' }}
      PREBUILT_IMAGE: cloudv10x/atesor-sandbox:debian-latest
      LOCAL_IMAGE: atesor-ai-sandbox-debian:latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Write .env from secrets
        run: |
          umask 077
          cat > .env <<'EOF'
          LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'openrouter' }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2=${{ vars.LANGCHAIN_TRACING_V2 || 'false' }}
          OPENROUTER_FALLBACK_MODELS=${{ vars.OPENROUTER_FALLBACK_MODELS }}
          EOF
      - name: Pull prebuilt sandbox image (skip local build)
        run: |
          docker pull --platform linux/riscv64 "$PREBUILT_IMAGE"
          docker tag "$PREBUILT_IMAGE" "$LOCAL_IMAGE"
      - name: Provision sandbox
        run: python3 main.py --setup-only --platform "$ATESOR_PLATFORM"
      - name: Run smoke batch
        run: python3 .github/scripts/batch_test.py --list "$LIST" --workers "$WORKERS" --package
      - name: Publish zip artifacts to monthly release
        if: always()
        uses: ./.github/actions/release-zips
        with:
          packages_dir: workspace/packages
          scope: atesor-debian-smoke
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debian-smoke-logs-${{ github.run_id }}
          path: |
            output/batch_logs/
            workspace/logs/
            workspace/output/
            workspace/packages/
            data/recipe_cache.json
          if-no-files-found: warn
          retention-days: 14

  # ------------------------------------------------------------------------- #
  # 2. atesor-debian-full (sharded)
  #
  # GitHub Actions caps a single job at 6h. The full package list grows over
  # time; instead of one monster job, we split it into shards of at most
  # `group_size` packages each 50.
  # ------------------------------------------------------------------------- #
  plan-full:
    name: plan-full
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      (
        github.event_name == 'workflow_dispatch' &&
        (inputs.target == 'full' || inputs.target == 'both')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      groups: ${{ steps.plan.outputs.groups }}
      total: ${{ steps.plan.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - id: plan
        name: Compute shard plan for full list
        run: |
          python3 .github/scripts/plan-shards.py \
            --list full \
            --group-size "${{ inputs.group_size || '50' }}" \
            >> "$GITHUB_OUTPUT"

  atesor-debian-full:
    name: atesor-debian-full (shard ${{ matrix.shard }}/${{ needs.plan-full.outputs.total }})
    needs: plan-full
    if: >-
      needs.plan-full.outputs.total != '0' &&
      (
        github.event_name == 'push' ||
        github.event_name == 'pull_request' ||
        github.event_name == 'schedule' ||
        (
          github.event_name == 'workflow_dispatch' &&
          (inputs.target == 'full' || inputs.target == 'both') &&
          (inputs.platform == 'debian' || inputs.platform == 'both')
        )
      )
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.plan-full.outputs.groups) }}
    # TODO: update to self-hosted or Cloud-V / RISE Runners
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: batch-port-debian-full-shard-${{ matrix.shard }}
      cancel-in-progress: false
    env:
      ATESOR_PLATFORM: debian
      LIST: full
      WORKERS: ${{ inputs.workers || '2' }}
      SHARD_INDEX: ${{ matrix.shard }}
      SHARD_TOTAL: ${{ needs.plan-full.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Write .env from secrets
        run: |
          umask 077
          cat > .env <<'EOF'
          LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'openrouter' }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2=${{ vars.LANGCHAIN_TRACING_V2 || 'false' }}
          OPENROUTER_FALLBACK_MODELS=${{ vars.OPENROUTER_FALLBACK_MODELS }}
          EOF
      - name: Provision sandbox
        run: python3 main.py --setup-only --platform "$ATESOR_PLATFORM"
      - name: Run full batch (shard ${{ matrix.shard }} of ${{ needs.plan-full.outputs.total }})
        run: |
          python3 .github/scripts/batch_test.py \
            --list "$LIST" \
            --workers "$WORKERS" \
            --shard-index "$SHARD_INDEX" \
            --shard-total "$SHARD_TOTAL" \
            --package
      - name: Publish zip artifacts to monthly release
        if: always()
        uses: ./.github/actions/release-zips
        with:
          packages_dir: workspace/packages
          scope: atesor-debian-full-shard-${{ matrix.shard }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debian-full-logs-${{ github.run_id }}-shard-${{ matrix.shard }}
          path: |
            output/batch_logs/
            workspace/logs/
            workspace/output/
            workspace/packages/
            data/recipe_cache.json
          if-no-files-found: warn
          retention-days: 30

  # ------------------------------------------------------------------------- #
  # 3. atesor-alpine-smoke
  # ------------------------------------------------------------------------- #
  atesor-alpine-smoke:
    name: atesor-alpine-smoke
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'workflow_dispatch' &&
        (inputs.target == 'smoke' || inputs.target == 'both') &&
        (inputs.platform == 'alpine' || inputs.platform == 'both')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: batch-port-alpine-smoke-${{ github.ref }}
      cancel-in-progress: true
    env:
      ATESOR_PLATFORM: alpine
      LIST: smoke
      WORKERS: ${{ inputs.workers || '2' }}
      PREBUILT_IMAGE: cloudv10x/atesor-sandbox:alpine-latest
      LOCAL_IMAGE: atesor-ai-sandbox:latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Write .env from secrets
        run: |
          umask 077
          cat > .env <<'EOF'
          LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'openrouter' }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2=${{ vars.LANGCHAIN_TRACING_V2 || 'false' }}
          OPENROUTER_FALLBACK_MODELS=${{ vars.OPENROUTER_FALLBACK_MODELS }}
          EOF
      - name: Pull prebuilt sandbox image (skip local build)
        run: |
          docker pull --platform linux/riscv64 "$PREBUILT_IMAGE"
          docker tag "$PREBUILT_IMAGE" "$LOCAL_IMAGE"
      - name: Provision sandbox
        run: python3 main.py --setup-only --platform "$ATESOR_PLATFORM"
      - name: Run smoke batch
        run: python3 .github/scripts/batch_test.py --list "$LIST" --workers "$WORKERS" --package
      - name: Publish zip artifacts to monthly release
        if: always()
        uses: ./.github/actions/release-zips
        with:
          packages_dir: workspace/packages
          scope: atesor-alpine-smoke
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpine-smoke-logs-${{ github.run_id }}
          path: |
            output/batch_logs/
            workspace/logs/
            workspace/output/
            workspace/packages/
            data/recipe_cache.json
          if-no-files-found: warn
          retention-days: 14

  # ------------------------------------------------------------------------- #
  # 4. atesor-alpine-full (sharded)
  # ------------------------------------------------------------------------- #
  atesor-alpine-full:
    name: atesor-alpine-full (shard ${{ matrix.shard }}/${{ needs.plan-full.outputs.total }})
    needs: plan-full
    if: >-
      needs.plan-full.outputs.total != '0' &&
      (
        github.event_name == 'push' ||
        github.event_name == 'pull_request' ||
        github.event_name == 'schedule' ||
        (
          github.event_name == 'workflow_dispatch' &&
          (inputs.target == 'full' || inputs.target == 'both') &&
          (inputs.platform == 'alpine' || inputs.platform == 'both')
        )
      )
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.plan-full.outputs.groups) }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: batch-port-alpine-full-shard-${{ matrix.shard }}
      cancel-in-progress: false
    env:
      ATESOR_PLATFORM: alpine
      LIST: full
      WORKERS: ${{ inputs.workers || '2' }}
      SHARD_INDEX: ${{ matrix.shard }}
      SHARD_TOTAL: ${{ needs.plan-full.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Write .env from secrets
        run: |
          umask 077
          cat > .env <<'EOF'
          LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'openrouter' }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2=${{ vars.LANGCHAIN_TRACING_V2 || 'false' }}
          OPENROUTER_FALLBACK_MODELS=${{ vars.OPENROUTER_FALLBACK_MODELS }}
          EOF
      - name: Provision sandbox
        run: python3 main.py --setup-only --platform "$ATESOR_PLATFORM"
      - name: Run full batch (shard ${{ matrix.shard }} of ${{ needs.plan-full.outputs.total }})
        run: |
          python3 .github/scripts/batch_test.py \
            --list "$LIST" \
            --workers "$WORKERS" \
            --shard-index "$SHARD_INDEX" \
            --shard-total "$SHARD_TOTAL" \
            --package
      - name: Publish zip artifacts to monthly release
        if: always()
        uses: ./.github/actions/release-zips
        with:
          packages_dir: workspace/packages
          scope: atesor-alpine-full-shard-${{ matrix.shard }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpine-full-logs-${{ github.run_id }}-shard-${{ matrix.shard }}
          path: |
            output/batch_logs/
            workspace/logs/
            workspace/output/
            workspace/packages/
            data/recipe_cache.json
          if-no-files-found: warn
          retention-days: 30
