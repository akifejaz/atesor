name: ATESOR AI Batch Porting Tests

# Runs the Atesor AI agent across a curated list of packages, building each
# one inside the riscv64 sandbox container.
#
# Matrix:
#
#   atesor-debian-smoke   debian sandbox (ubuntu:jammy base) + smoke list
#   atesor-debian-full    debian sandbox (ubuntu:jammy base) + full  list
#   atesor-alpine-smoke   alpine sandbox                     + smoke list
#   atesor-alpine-full    alpine sandbox                     + full  list

on:
  push:
    branches: [main, ci-dev]
  pull_request:
    branches: [main, ci-dev]
  # schedule:
  #   # 02:00 UTC nightly -> full sweep on both platforms
  #   - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Which list(s) to run"
        type: choice
        default: smoke
        options: [smoke, full, both]
      platform:
        description: "Sandbox distro"
        type: choice
        default: both
        options: [debian, alpine, both]
      workers:
        description: "Parallel worker containers"
        type: string
        default: "2"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  # Force unbuffered stdout/stderr so batch_test.py logs stream live to
  PYTHONUNBUFFERED: "1"

jobs:
  batch:
    name: atesor-${{ matrix.platform }}-${{ matrix.list }}
    # Gate each matrix entry against the event that triggered the run.
    if: >-
      (
        matrix.list == 'smoke' &&
        (github.event_name == 'push' || github.event_name == 'pull_request')
      ) ||
      (
        matrix.list == 'full' && github.event_name == 'schedule'
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        (inputs.target == 'both' || inputs.target == matrix.list) &&
        (inputs.platform == 'both' || inputs.platform == matrix.platform)
      )
    runs-on: ubuntu-latest
    #   runs-on: [self-hosted, linux, x64]
    timeout-minutes: ${{ matrix.list == 'smoke' && 60 || 350 }}
    strategy:
      fail-fast: false
      matrix:
        platform: [debian, alpine]
        list: [smoke, full]
    concurrency:
      group: >-
        batch-port-${{ matrix.platform }}-${{ matrix.list }}-${{
          matrix.list == 'smoke' && github.ref || 'global'
        }}
      cancel-in-progress: ${{ matrix.list == 'smoke' }}
    env:
      ATESOR_PLATFORM: ${{ matrix.platform }}
      WORKERS: ${{ inputs.workers || '2' }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable riscv64 emulation (binfmt_misc + QEMU)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          umask 077
          cat > .env <<'EOF'
          LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'openrouter' }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2=${{ vars.LANGCHAIN_TRACING_V2 || 'false' }}
          OPENROUTER_FALLBACK_MODELS=${{ vars.OPENROUTER_FALLBACK_MODELS }}
          EOF

      - name: Provision sandbox (build image + container)
        run: python3 main.py --setup-only --platform "$ATESOR_PLATFORM"

      - name: Run ${{ matrix.list }} batch on ${{ matrix.platform }}
        run: |
          python3 .github/scripts/batch_test.py \
            --list ${{ matrix.list }} \
            --workers "$WORKERS"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.list }}-logs-${{ github.run_id }}
          path: |
            output/batch_logs/
            workspace/logs/
            workspace/output/
            data/recipe_cache.json
          if-no-files-found: warn
          retention-days: ${{ matrix.list == 'smoke' && 14 || 30 }}
