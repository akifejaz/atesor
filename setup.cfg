[flake8]
# House style: PEP 8, 79-char hard limit, Google docstrings.
# See .github/skills/python-standards/SKILL.md for the full rule set.
max-line-length = 79
docstring-convention = google
extend-ignore =
    # black formats slices as `x[a : b]`; documented deviation
    # (see references/pep8_exceptions.md).
    E203,
    # Line break BEFORE binary operator is the agreed style.
    W503,
    # House style: __init__ carries no docstring — document the class.
    D107
exclude =
    .git,
    __pycache__,
    workspace,
    artifacts,
    data,
    .pytest_cache
per-file-ignores =
    # Package __init__ re-exports form the public API.
    src/__init__.py:F401
